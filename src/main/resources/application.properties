server.port=8080

# Spring Boot's default @Scheduled pool is a single thread shared by every @Scheduled method in the app - a
# long-running one (e.g. ProcessData's SQS long-poll loop) can starve any others added later. Give scheduling
# its own small pool so each @Scheduled method always gets a thread.
spring.task.scheduling.pool.size=5

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

db.user=root
db.password=password
db.name=web
db.host=localhost
db.port=3306
db.secret_store=